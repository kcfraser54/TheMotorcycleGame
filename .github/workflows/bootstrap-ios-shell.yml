name: Bootstrap iOS Xcode shell

# One-shot, manually-triggered workflow that runs Godot's iOS export ONCE to
# produce the native Xcode shell project. The generated `ios/` directory is
# uploaded as a workflow artifact -- download it, commit it under `ios/` in
# the repo, and from that point on PR CI / TestFlight deploys only need to
# refresh `ios/TheMotorcycleGame/TheMotorcycleGame.pck` via `--export-pack`
# and run `xcodebuild`.
#
# Re-run this workflow whenever any of the following changes:
#   - Godot version (GODOT_VERSION)
#   - iOS export options in `export_presets.cfg` (bundle id, icons, capabilities,
#     orientation, version, launch storyboard, plugins, ...)
#   - iOS plugins / GDExtensions linked into the shell
#
# After downloading the artifact, replace the contents of `ios/` in the repo
# with the artifact contents and commit on a branch.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6"
  GODOT_STATUS: "stable"
  IOS_EXPORT_PRESET: "iOS"
  IOS_XCODE_PROJECT_NAME: "TheMotorcycleGame"

jobs:
  bootstrap:
    name: Generate iOS Xcode shell (artifact)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Godot ${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }} + iOS templates
        run: |
          set -euo pipefail
          VERSION="${GODOT_VERSION}-${GODOT_STATUS}"

          curl -fL --retry 3 \
            -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${VERSION}/Godot_v${VERSION}_macos.universal.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot.app /Applications/Godot.app
          sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

          curl -fL --retry 3 \
            -o /tmp/godot_templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${VERSION}/Godot_v${VERSION}_export_templates.tpz"
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q /tmp/godot_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TEMPLATES_DIR/"

      - name: Verify Godot install
        run: godot --version

      - name: Import project resources
        run: godot --headless --import --quit || true

      - name: Ensure export_presets.cfg exists
        run: |
          if [ ! -f "export_presets.cfg" ]; then
            echo "::error::export_presets.cfg is missing. Commit it to the repo so Godot can export the iOS shell."
            exit 1
          fi

      - name: Inject Apple Team ID into export_presets.cfg
        # Godot's iOS exporter validates the Team ID as part of has_valid_export_configuration().
        # The xcodebuild step in deploy-testflight.yml will re-sign with this same Team ID.
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_TEAM_ID}" ]; then
            echo "::error::APPLE_TEAM_ID secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          sed -i '' \
            "s|application/app_store_team_id=\"[^\"]*\"|application/app_store_team_id=\"${APPLE_TEAM_ID}\"|" \
            export_presets.cfg

      - name: Export iOS Xcode project (full shell)
        run: |
          set -euo pipefail
          mkdir -p ios
          godot --headless --verbose \
            --export-release "${IOS_EXPORT_PRESET}" \
            "ios/${IOS_XCODE_PROJECT_NAME}.xcodeproj"

      - name: Strip generated PCK from shell artifact
        # The PCK is regenerated on every CI run via --export-pack and must
        # not be committed. Remove it so the artifact is shell-only.
        run: |
          set -euo pipefail
          find ios -name "*.pck" -print -delete || true

      - name: Upload generated iOS shell as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-shell
          path: ios/
          if-no-files-found: error
          retention-days: 14
