name: Deploy to TestFlight

# On push to `main`:
#   1. `export-pck` (Linux, fast): runs Godot headless and produces a content-only
#      `game.pck` via `--export-pack`. No iOS exporter, no Team-ID injection,
#      no signing fields needed.
#   2. `deploy` (macOS): drops the PCK into the committed iOS Xcode shell
#      under `ios/`, signs with a distribution certificate + provisioning
#      profile, archives via `xcodebuild`, exports a signed .ipa, and
#      uploads to TestFlight via the App Store Connect API.
#
# The Xcode shell at `ios/TheMotorcycleGame.xcodeproj` is generated once by
# the `bootstrap-ios-shell.yml` workflow and committed. Re-run that workflow
# whenever Godot version or any iOS export option changes.
#
# Required repository secrets
# ---------------------------------------------------------------------------
# Code signing:
#   APPLE_CERTIFICATE_BASE64          base64 of your Apple Distribution .p12
#   APPLE_CERTIFICATE_PASSWORD        password for the .p12
#   APPLE_PROVISIONING_PROFILE        base64 of your App Store provisioning profile (.mobileprovision)
#
# Project identity:
#   APPLE_TEAM_ID                     your 10-char Apple Developer team ID
#                                     (used by xcodebuild only -- no longer
#                                     injected into export_presets.cfg)
#
# App Store Connect API key (for TestFlight upload):
#   APP_STORE_CONNECT_API_KEY_ID      e.g. ABCDE12345
#   APP_STORE_CONNECT_API_ISSUER_ID   UUID issuer id
#   APP_STORE_CONNECT_API_KEY_BASE64  base64 of the .p8 key file
#
# The temp-keychain password is generated at runtime, and the provisioning
# profile's Name, UUID, and bundle identifier are extracted from the
# profile itself -- so no additional secrets are needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-testflight
  cancel-in-progress: false

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6"
  GODOT_STATUS: "stable"
  IOS_EXPORT_PRESET: "iOS"
  IOS_XCODE_PROJECT_NAME: "TheMotorcycleGame"
  PCK_ARTIFACT_NAME: "game-pck"

jobs:
  # ---------------------------------------------------------------------------
  # Export the game.pck on Linux (no iOS toolchain involvement). PCK export
  # is content-only, so it does not exercise the iOS exporter's signing /
  # Team-ID validation.
  # ---------------------------------------------------------------------------
  export-pck:
    name: Export game.pck (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Install Godot ${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }} (headless)
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          VERSION="${GODOT_VERSION}-${GODOT_STATUS}"
          ZIP="Godot_v${VERSION}_linux.x86_64.zip"
          URL="https://github.com/godotengine/godot/releases/download/${VERSION}/${ZIP}"
          curl -fL --retry 3 -o /tmp/godot.zip "$URL"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot_v${VERSION}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Verify Godot install
        run: godot --version

      - name: Ensure export_presets.cfg exists
        run: |
          if [ ! -f "export_presets.cfg" ]; then
            echo "::error::export_presets.cfg is missing. Commit it to the repo"
            echo "::error::(you may need to remove it from .gitignore or run 'git add -f export_presets.cfg')"
            echo "::error::so CI can export the game.pck."
            exit 1
          fi

      - name: Import project resources
        run: godot --headless --import --quit || true

      - name: Export game.pck
        run: |
          set -euo pipefail
          mkdir -p build
          godot --headless --verbose \
            --export-pack "${IOS_EXPORT_PRESET}" \
            "build/game.pck"
          if [ ! -s "build/game.pck" ]; then
            echo "::error::game.pck was not produced or is empty."
            exit 1
          fi
          ls -la build/

      - name: Upload game.pck artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PCK_ARTIFACT_NAME }}
          path: build/game.pck
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build, sign, archive, export, and upload to TestFlight on macOS using
  # the committed iOS Xcode shell + the freshly-built PCK.
  # ---------------------------------------------------------------------------
  deploy:
    name: Build & upload to TestFlight
    needs: export-pck
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify committed iOS Xcode shell is present
        run: |
          set -euo pipefail
          if [ ! -d "ios/${IOS_XCODE_PROJECT_NAME}.xcodeproj" ]; then
            echo "::error::No committed iOS Xcode shell found at ios/${IOS_XCODE_PROJECT_NAME}.xcodeproj."
            echo "::error::Run the 'Bootstrap iOS Xcode shell' workflow, download the 'ios-shell' artifact,"
            echo "::error::and commit its contents under ios/ before deploying. See README.md."
            exit 1
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # -----------------------------------------------------------------------
      # Drop the freshly-exported PCK into the committed Xcode shell.
      # -----------------------------------------------------------------------
      - name: Download game.pck artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PCK_ARTIFACT_NAME }}
          path: build/

      - name: Inject game.pck into iOS shell
        run: |
          set -euo pipefail
          if [ ! -s "build/game.pck" ]; then
            echo "::error::Downloaded game.pck is missing or empty."
            exit 1
          fi
          # The Godot-generated Xcode shell expects the PCK at
          # ios/<ProjectName>/<ProjectName>.pck (it is added to the bundle as
          # a resource of the same name as the project).
          DEST_DIR="ios/${IOS_XCODE_PROJECT_NAME}"
          mkdir -p "$DEST_DIR"
          cp build/game.pck "$DEST_DIR/${IOS_XCODE_PROJECT_NAME}.pck"
          ls -la "$DEST_DIR/${IOS_XCODE_PROJECT_NAME}.pck"

      # -----------------------------------------------------------------------
      # Code signing setup: import cert + provisioning profile.
      # (Unchanged from the previous deploy workflow.)
      # -----------------------------------------------------------------------
      - name: Import signing certificate & provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64:   ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Generate an ephemeral password for the temp keychain (never logged).
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$APPLE_CERTIFICATE_BASE64"   | base64 --decode > "$CERT_PATH"
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          # Create a temporary keychain dedicated to this run.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" > /dev/null

          # Add the temp keychain to the search list, keeping login keychain.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Decode the provisioning profile to a plist so we can read fields.
          security cms -D -i "$PROFILE_PATH" -o "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID"         "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name"         "$PROFILE_PLIST")
          # application-identifier looks like "TEAMID.com.example.bundle"; strip the team prefix.
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")
          BUNDLE_ID="${APP_ID#*.}"

          # Install the provisioning profile into the expected location.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"

          # Export values for later steps (KEYCHAIN_PASSWORD is masked).
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
            echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID"
            echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME"
            echo "IOS_BUNDLE_IDENTIFIER=$BUNDLE_ID"
          } >> "$GITHUB_ENV"

          echo "Using profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "Bundle identifier: $BUNDLE_ID"

      # -----------------------------------------------------------------------
      # Archive + export signed IPA against the committed Xcode shell.
      # -----------------------------------------------------------------------
      - name: Archive (xcodebuild)
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_TEAM_ID}" ]; then
            echo "::error::APPLE_TEAM_ID secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          xcodebuild \
            -project "${IOS_XCODE_PROJECT_NAME}.xcodeproj" \
            -scheme "${IOS_XCODE_PROJECT_NAME}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/${IOS_XCODE_PROJECT_NAME}.xcarchive" \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export signed IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/${IOS_XCODE_PROJECT_NAME}.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
          retention-days: 14

      # -----------------------------------------------------------------------
      # Upload to TestFlight via App Store Connect API
      # -----------------------------------------------------------------------
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64:  ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          # xcrun altool expects the .p8 in a known private_keys directory.
          PRIVATE_KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$PRIVATE_KEYS_DIR"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > "$PRIVATE_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)
          echo "Uploading $IPA to TestFlight"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      # -----------------------------------------------------------------------
      # Cleanup: always remove the temporary keychain, even on failure.
      # -----------------------------------------------------------------------
      - name: Clean up keychain & secrets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$HOME/.appstoreconnect/private_keys"/AuthKey_*.p8 || true
