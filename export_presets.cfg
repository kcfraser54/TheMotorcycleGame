[preset.0]
name="iOS"
platform="iOS"
runnable=true
dedicated_server=false

custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""

# IMPORTANT: let Godot choose output folder behavior in CI
export_path="build/ios"

encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2


[preset.0.options]

# -----------------------------
# Templates
# -----------------------------
custom_template/debug=""
custom_template/release=""

# -----------------------------
# Architecture
# -----------------------------
architectures/arm64=true

# -----------------------------
# Identity (ALL REQUIRED FIELDS)
# -----------------------------
application/bundle_identifier="com.midnightcheese.thedistance"
application/display_name="TheMotorcycleGame"
application/app_store_team_id="AAAAAAAAAA"

application/short_version="1.0.0"
application/version="1.0.0"

# -----------------------------
# IMPORTANT: DO NOT TRIGGER IOS SIGNING PIPELINE IN CI
# -----------------------------
application/export_project_only=true

# Leave these empty to avoid CI validation issues
application/provisioning_profile_uuid_debug=""
application/provisioning_profile_uuid_release=""
application/code_sign_identity_debug=""
application/code_sign_identity_release=""

# IMPORTANT: remove signature field entirely (do NOT define it)

# -----------------------------
# EXPORT MODE (CI SAFE)
# -----------------------------
# These must be blank to avoid enum validation issues in headless CI
application/export_method_debug=""
application/export_method_release=""

application/targeted_device_family=0

# -----------------------------
# ICONS (must exist or CI will fail later)
# -----------------------------
application/icon_interpolation=4
application/launch_screens_interpolation=4

icons/iphone_120x120="res://assets/icons/icon_120x120.png"
icons/iphone_180x180="res://assets/icons/icon_180x180.png"
icons/ipad_76x76="res://assets/icons/icon_76x76.png"
icons/ipad_152x152="res://assets/icons/icon_152x152.png"
icons/ipad_167x167="res://assets/icons/icon_167x167.png"
icons/app_store_1024x1024="res://assets/icons/icon_1024x1024.png"

# -----------------------------
# Launch screen
# -----------------------------
storyboard/use_launch_screen_storyboard=true
storyboard/image_scale_mode=0
storyboard/custom_image@2x=""
storyboard/custom_image@3x=""
storyboard/use_custom_bg_color=false
storyboard/custom_bg_color=Color(0, 0, 0, 1)

# -----------------------------
# Capabilities (disabled for CI)
# -----------------------------
capabilities/access_wifi=false
capabilities/push_notifications=false

privacy/camera=false
privacy/microphone=false
privacy/photolibrary=false

user_data/accessible_from_files_app=false
user_data/accessible_from_itunes_sharing=false
