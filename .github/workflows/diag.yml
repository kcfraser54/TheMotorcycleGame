name: Export Diagnostic

on:
  workflow_dispatch:  # manual trigger only — run it from the Actions tab

env:
  GODOT_VERSION: "4.6.2"
  GODOT_STATUS: "stable"
  IOS_EXPORT_PRESET: "iOS"
  IOS_XCODE_PROJECT_NAME: "TheMotorcycleGame"

jobs:
  diagnose:
    name: Diagnose iOS Export
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_macos.universal.zip
          unzip -q Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_macos.universal.zip
          mv "Godot.app" /Applications/Godot.app
          sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_STATUS }}"
          mkdir -p "$TEMPLATES_DIR"

          wget -q https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_export_templates.tpz

          unzip -q Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_export_templates.tpz

          mv templates/* "$TEMPLATES_DIR/"

      - name: Inspect iOS Templates
        run: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable"
          
          echo "=== All files in templates dir ==="
          ls -la "$TEMPLATES_DIR"
          
          echo "=== Contents of ios.zip ==="
          unzip -l "$TEMPLATES_DIR/ios.zip"
          
          echo "=== Godot source - what iOS export expects ==="
          # Check if there's a version.txt
          cat "$TEMPLATES_DIR/version.txt" || echo "No version.txt found"

      - name: Confirm Godot Version
        run: godot --version

      - name: Confirm Export Templates Exist
        run: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_STATUS }}"
          echo "=== Template directory ==="
          ls -la "$TEMPLATES_DIR" || echo "TEMPLATES DIRECTORY NOT FOUND"

      - name: Print export_presets.cfg
        run: |
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg || echo "FILE NOT FOUND IN REPO ROOT"

      - name: Confirm Icon Files Exist
        run: |
          echo "=== Checking icon paths ==="
          for f in \
            "assets/icons/icon_120x120.png" \
            "assets/icons/icon_180x180.png" \
            "assets/icons/icon_76x76.png" \
            "assets/icons/icon_152x152.png" \
            "assets/icons/icon_167x167.png" \
            "assets/icons/icon_1024x1024.png"
          do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
            fi
          done
      - name: Attempt Export and Capture Full Output
        run: |
            mkdir -p ios
            godot --headless --verbose \
              --export-release "${{ env.IOS_EXPORT_PRESET }}" \
              "ios/${{ env.IOS_XCODE_PROJECT_NAME }}.xcodeproj" 2>&1 | tee export_log.txt || true

      - name: Print Full Export Log
        run: |
            echo "=== FULL EXPORT LOG ==="
            cat export_log.txt

      - name: Check Godot Export Preset Validation
        run: |
          echo "=== Xcode version ==="
          xcodebuild -version

          echo "=== Available SDKs ==="
          xcodebuild -showsdks

          echo "=== Check for iOS SDK ==="
          xcrun --sdk iphoneos --show-sdk-path || echo "iOS SDK NOT FOUND"

          echo "=== Godot export templates installed ==="
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable"
          ls "$TEMPLATES_DIR" | grep -i ios || echo "NO IOS TEMPLATES FOUND"

          echo "=== iOS specific template files ==="
          ls "$TEMPLATES_DIR" | grep -i iphone || echo "NO IPHONE TEMPLATES FOUND"
  
      - name: Search Log for Configuration Errors
        run: |
          echo "=== All ERROR lines ==="
          grep -i "error" export_log.txt || echo "No error lines found"
  
          echo "=== All WARN lines ==="
          grep -i "warn" export_log.txt || echo "No warn lines found"
  
          echo "=== Preset config check ==="
          grep -i "team\|signing\|provision\|bundle\|identity\|certificate" export_log.txt || echo "No signing-related lines found"
  
      - name: Print export_presets.cfg as Godot sees it
        run: |
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg
  
      - name: Check Godot editor logs
        run: |
          echo "=== Godot editor logs ==="
          LOG_DIR="$HOME/Library/Application Support/Godot/logs"
          ls -la "$LOG_DIR" || echo "No log directory found"
          find "$LOG_DIR" -name "*.log" -exec cat {} \; 2>/dev/null || echo "No logs found"

      - name: Check project settings for iOS requirements
        run: |
          echo "=== project.godot texture compression settings ==="
          grep -i "etc2\|astc\|vram\|compress" project.godot || echo "No compression settings found - this is likely the problem"

      - name: Print export_presets.cfg
        run: |
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg
          
          echo "=== Checking for hidden characters or encoding issues ==="
          cat -A export_presets.cfg | grep -E "team_id|provisioning|code_sign|export_path"

          
      
