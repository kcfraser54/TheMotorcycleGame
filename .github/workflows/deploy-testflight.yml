name: Deploy to TestFlight

# On push to `main`, exports the Godot iOS Xcode project, signs it with a
# distribution certificate + provisioning profile, archives it, exports a
# signed .ipa, and uploads it to TestFlight using the App Store Connect
# API.
#
# Required repository secrets
# ---------------------------------------------------------------------------
# Code signing:
#   APPLE_CERTIFICATE_BASE64          base64 of your Apple Distribution .p12
#   APPLE_CERTIFICATE_PASSWORD        password for the .p12
#   APPLE_PROVISIONING_PROFILE        base64 of your App Store provisioning profile (.mobileprovision)
#
# Project identity:
#   APPLE_TEAM_ID                     your 10-char Apple Developer team ID
#
# App Store Connect API key (for TestFlight upload):
#   APP_STORE_CONNECT_API_KEY_ID      e.g. ABCDE12345
#   APP_STORE_CONNECT_API_ISSUER_ID   UUID issuer id
#   APP_STORE_CONNECT_API_KEY_BASE64  base64 of the .p8 key file
#
# The temp-keychain password is generated at runtime, and the provisioning
# profile's Name, UUID, and bundle identifier are extracted from the
# profile itself -- so no additional secrets are needed.
#
# NOTE: `export_presets.cfg` must be committed to the repo for Godot's iOS
# export to work in CI.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-testflight
  cancel-in-progress: false

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6"
  GODOT_STATUS: "stable"
  IOS_EXPORT_PRESET: "iOS"
  IOS_BUILD_DIR: "build/ios"
  IOS_XCODE_PROJECT_NAME: "TheMotorcycleGame"

jobs:
  deploy:
    name: Build & upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # -----------------------------------------------------------------------
      # Godot + iOS export templates
      # -----------------------------------------------------------------------
      - name: Cache Godot + export templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/Library/Application Support/Godot/export_templates
          key: godot-macos-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Install Godot ${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }} + iOS templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          VERSION="${GODOT_VERSION}-${GODOT_STATUS}"

          curl -fL --retry 3 \
            -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${VERSION}/Godot_v${VERSION}_macos.universal.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot.app /Applications/Godot.app
          sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

          curl -fL --retry 3 \
            -o /tmp/godot_templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${VERSION}/Godot_v${VERSION}_export_templates.tpz"
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q /tmp/godot_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TEMPLATES_DIR/"

      - name: Verify Godot install
        run: godot --version

      - name: Verify iOS export templates are present
        run: |
          set -euo pipefail
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          if [ ! -d "$TEMPLATES_DIR" ]; then
            echo "::error::iOS export templates directory not found at: $TEMPLATES_DIR"
            echo "::error::Check that GODOT_VERSION ($GODOT_VERSION) and GODOT_STATUS ($GODOT_STATUS) match a published Godot release."
            exit 1
          fi
          if ! ls "$TEMPLATES_DIR"/ios* "$TEMPLATES_DIR"/iphone* 2>/dev/null | grep -q .; then
            echo "::error::No iOS template files found in $TEMPLATES_DIR"
            echo "::error::Files present: $(ls "$TEMPLATES_DIR")"
            exit 1
          fi
          echo "iOS templates found in $TEMPLATES_DIR:"
          ls "$TEMPLATES_DIR"/ios* "$TEMPLATES_DIR"/iphone* 2>/dev/null || true

      # -----------------------------------------------------------------------
      # Code signing setup: import cert + provisioning profile
      # -----------------------------------------------------------------------
      - name: Import signing certificate & provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64:   ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Generate an ephemeral password for the temp keychain (never logged).
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$APPLE_CERTIFICATE_BASE64"   | base64 --decode > "$CERT_PATH"
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          # Create a temporary keychain dedicated to this run.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" > /dev/null

          # Add the temp keychain to the search list, keeping login keychain.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Decode the provisioning profile to a plist so we can read fields.
          security cms -D -i "$PROFILE_PATH" -o "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID"         "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name"         "$PROFILE_PLIST")
          # application-identifier looks like "TEAMID.com.example.bundle"; strip the team prefix.
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")
          BUNDLE_ID="${APP_ID#*.}"

          # Install the provisioning profile into the expected location.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"

          # Export values for later steps (KEYCHAIN_PASSWORD is masked).
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
            echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID"
            echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME"
            echo "IOS_BUNDLE_IDENTIFIER=$BUNDLE_ID"
          } >> "$GITHUB_ENV"

          echo "Using profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "Bundle identifier: $BUNDLE_ID"

      # -----------------------------------------------------------------------
      # Export Godot iOS Xcode project
      # -----------------------------------------------------------------------
      - name: Import project resources
        run: godot --headless --import --quit || true

      - name: Ensure export_presets.cfg exists
        run: |
          if [ ! -f "export_presets.cfg" ]; then
            echo "::error::export_presets.cfg is missing. Commit it to the repo"
            echo "::error::(you may need to remove it from .gitignore or run 'git add -f export_presets.cfg')"
            exit 1
          fi

      - name: Inject Apple Team ID into export_presets.cfg
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          sed -i '' \
            "s|application/app_store_team_id=\"[^\"]*\"|application/app_store_team_id=\"${APPLE_TEAM_ID}\"|" \
            export_presets.cfg
          grep -q "application/app_store_team_id=\"${APPLE_TEAM_ID}\"" export_presets.cfg || {
            echo "::error::Failed to inject APPLE_TEAM_ID into export_presets.cfg. Check the file format or that the APPLE_TEAM_ID secret is set."
            exit 1
          }
          echo "Team ID injected into export_presets.cfg"

      - name: Export iOS Xcode project (release)
        run: |
          set -euo pipefail
          mkdir -p "${IOS_BUILD_DIR}"
          # Capture output so we can surface actionable errors as annotations.
          GODOT_LOG="$RUNNER_TEMP/godot_export.log"
          set +e
          godot --headless \
            --export-release "${IOS_EXPORT_PRESET}" \
            "${IOS_BUILD_DIR}/${IOS_XCODE_PROJECT_NAME}.xcodeproj" \
            2>&1 | tee "$GODOT_LOG"
          GODOT_EXIT=${PIPESTATUS[0]}
          set -e
          if [ $GODOT_EXIT -ne 0 ]; then
            echo ""
            echo "--- Godot export failed. Surfacing configuration errors as annotations ---"
            grep -E "^(ERROR|WARN|error|warn)" "$GODOT_LOG" | while IFS= read -r line; do
              echo "::error::$line"
            done
            echo ""
            echo "::error::Godot export exited with code $GODOT_EXIT. See log lines above for the specific configuration errors."
            echo "::notice::Common causes:"
            echo "::notice::  1. Export templates not installed or wrong version (GODOT_VERSION=$GODOT_VERSION GODOT_STATUS=$GODOT_STATUS)"
            echo "::notice::  2. application/export_project_only must be 'true' in export_presets.cfg so Godot only generates the Xcode project (signing is handled by xcodebuild)"
            echo "::notice::  3. application/bundle_identifier must be set in export_presets.cfg"
            exit $GODOT_EXIT
          fi

      # -----------------------------------------------------------------------
      # Archive + export signed IPA
      # -----------------------------------------------------------------------
      - name: Archive (xcodebuild)
        working-directory: ${{ env.IOS_BUILD_DIR }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${IOS_XCODE_PROJECT_NAME}.xcodeproj" \
            -scheme "${IOS_XCODE_PROJECT_NAME}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/${IOS_XCODE_PROJECT_NAME}.xcarchive" \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export signed IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/${IOS_XCODE_PROJECT_NAME}.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
          retention-days: 14

      # -----------------------------------------------------------------------
      # Upload to TestFlight via App Store Connect API
      # -----------------------------------------------------------------------
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64:  ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          # xcrun altool expects the .p8 in a known private_keys directory.
          PRIVATE_KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$PRIVATE_KEYS_DIR"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > "$PRIVATE_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)
          echo "Uploading $IPA to TestFlight"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      # -----------------------------------------------------------------------
      # Cleanup: always remove the temporary keychain, even on failure.
      # -----------------------------------------------------------------------
      - name: Clean up keychain & secrets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$HOME/.appstoreconnect/private_keys"/AuthKey_*.p8 || true
